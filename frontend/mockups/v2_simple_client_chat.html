<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JH Salon - Booking Chat</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              black: '#000000',
              white: '#FFFFFF',
              gold: '#D4AF37',
              red: '#D90429',
              light: '#F8F9FA',
              dark: '#121212'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

</head>
<body class="bg-brand-light font-sans antialiased text-brand-black h-screen flex justify-center">
  <div class="w-full max-w-md bg-brand-white h-full flex flex-col shadow-2xl relative">
    <!-- Header -->
    <header class="bg-brand-black text-brand-white p-4 flex items-center justify-between shadow-md z-10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-full bg-brand-gold flex items-center justify-center text-brand-black font-bold text-xl">JH</div>
        <div>
          <h1 class="font-semibold text-lg leading-tight">Jawed Habib</h1>
          <p class="text-brand-gold text-xs flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span> AI Assistant Online</p>
        </div>
      </div>
      <button class="text-brand-white hover:text-brand-gold transition"><i data-lucide="menu"></i></button>
    </header>

    <!-- Chat Area -->
    <main class="flex-1 overflow-y-auto p-4 space-y-6 bg-gray-50">
      <!-- AI Message -->
      <div class="flex gap-3 max-w-[85%]">
        <div class="w-8 h-8 rounded-full bg-brand-gold flex-shrink-0 flex items-center justify-center text-brand-black font-bold text-xs mt-1">AI</div>
        <div class="bg-brand-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100">
          <p class="text-sm">Welcome to Jawed Habib Kurnool! ✨ How can I help you look your best today?</p>
        </div>
      </div>

      <!-- Quick Replies -->
      <div class="flex flex-wrap gap-2 pl-11">
        <button class="px-4 py-2 bg-brand-black text-brand-gold text-sm rounded-full hover:bg-gray-800 transition shadow-sm border border-brand-gold/30">Book a Haircut</button>
        <button class="px-4 py-2 bg-white text-brand-black text-sm rounded-full hover:bg-gray-50 transition shadow-sm border border-gray-200">View Services</button>
      </div>

      <!-- User Message -->
      <div class="flex gap-3 max-w-[85%] ml-auto justify-end">
        <div class="bg-brand-black text-brand-white p-4 rounded-2xl rounded-tr-none shadow-sm">
          <p class="text-sm">I need a haircut and beard trim tomorrow afternoon.</p>
        </div>
      </div>

      <!-- AI Message -->
      <div class="flex gap-3 max-w-[85%]">
        <div class="w-8 h-8 rounded-full bg-brand-gold flex-shrink-0 flex items-center justify-center text-brand-black font-bold text-xs mt-1">AI</div>
        <div class="bg-brand-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100">
          <p class="text-sm">Great! I have openings tomorrow at <strong>2:00 PM</strong> or <strong>4:30 PM</strong> with our senior stylist, Rahul. Which works better for you?</p>
          <div class="mt-3 flex flex-col gap-2">
            <button class="w-full py-2.5 bg-brand-gold text-brand-black font-medium rounded-xl hover:bg-yellow-500 transition shadow-sm">2:00 PM</button>
            <button class="w-full py-2.5 bg-brand-gold text-brand-black font-medium rounded-xl hover:bg-yellow-500 transition shadow-sm">4:30 PM</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="bg-brand-white p-4 border-t border-gray-200">
      <div class="flex items-center gap-2 bg-gray-100 rounded-full p-1 pr-2">
        <button class="p-2 text-gray-500 hover:text-brand-black transition rounded-full"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
        <input type="text" placeholder="Type your message..." class="flex-1 bg-transparent border-none focus:ring-0 text-sm px-2 py-2 outline-none">
        <button class="p-2 bg-brand-black text-brand-gold rounded-full hover:bg-gray-800 transition flex items-center justify-center w-9 h-9"><i data-lucide="send" class="w-4 h-4"></i></button>
      </div>
    </footer>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
