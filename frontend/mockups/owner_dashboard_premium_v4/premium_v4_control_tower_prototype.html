<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V4 Control Tower</title><style>body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#f5f7fb,#e8eef7);padding:24px;color:#0f172a}.hero,.panel,.card{background:rgba(255,255,255,.72);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.6);border-radius:28px;box-shadow:0 20px 50px rgba(15,23,42,.12)}.hero{padding:28px;background:linear-gradient(135deg,#5b5ce6,#3b82f6);color:#fff;animation:float 7s ease-in-out infinite}.grid{display:grid;grid-template-columns:1.2fr .9fr;gap:20px;margin-top:20px}.panel{padding:22px}.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{padding:14px;transition:transform .3s ease}.card:hover{transform:translateY(-6px)}.photo{height:130px;border-radius:20px;background:linear-gradient(180deg,#f472b6,#818cf8);position:relative}.photo:after{content:"photo placeholder";position:absolute;left:16px;bottom:14px;color:#fff;font-weight:700}.chart{height:230px;border-radius:24px;background:#fff;position:relative;overflow:hidden}.line{position:absolute;left:18px;right:18px;top:16px;bottom:28px}.line svg{width:100%;height:100%}.a{stroke:#6366f1;stroke-width:4;fill:rgba(99,102,241,.12);stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 2.2s ease forwards}.b{stroke:#10b981;stroke-width:3;fill:none;stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 2.7s ease .25s forwards}@keyframes draw{to{stroke-dashoffset:0}}@keyframes float{50%{transform:translateY(-6px)}}</style></head><body><div class="hero"><h1>SalonOS V4 — cinematic control tower</h1><p>Real chart polish, photographic merchandising, and premium motion framing.</p></div><div class="grid"><div class="panel"><h2>Revenue trajectory</h2><div class="chart"><div class="line"><svg viewBox="0 0 600 220" preserveAspectRatio="none"><path class="a" d="M0,190 L60,160 L120,165 L180,120 L240,110 L300,90 L360,70 L420,44 L480,28 L540,36 L600,20 L600,220 L0,220 Z"></path><path class="b" d="M0,200 L60,185 L120,176 L180,180 L240,160 L300,150 L360,138 L420,128 L480,118 L540,106 L600,92"></path></svg></div></div></div><div class="panel"><h2>Featured merchandising</h2><div class="cards"><div class="card"><div class="photo"></div><h3>Lived-in Balayage</h3><p>$220</p></div><div class="card"><div class="photo" style="background:linear-gradient(180deg,#34d399,#38bdf8)"></div><h3>Gloss + Repair</h3><p>$78</p></div></div></div></div></body></html>
