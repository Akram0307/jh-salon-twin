<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SalonOS – Stripe Style Dashboard</title>
<style>
body{font-family:Inter,Arial;background:#0b1020;color:#fff;margin:0}
.header{padding:20px;font-size:22px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;padding:20px}
.card{background:#121933;padding:20px;border-radius:12px}
.metric{font-size:28px;font-weight:700}
.label{opacity:.7}
</style>
</head>
<body>
<div class="header">SalonOS Revenue Dashboard</div>
<div class="grid">
<div class="card"><div class="label">Today's Revenue</div><div class="metric">₹18,420</div></div>
<div class="card"><div class="label">Bookings Today</div><div class="metric">42</div></div>
<div class="card"><div class="label">Utilization</div><div class="metric">81%</div></div>
<div class="card"><div class="label">AI Upsells</div><div class="metric">₹3,200</div></div>
</div>
</body>
</html>
