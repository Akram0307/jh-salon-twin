<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SalonOS Owner Dashboard Concept 2</title>
<style>
body{font-family:Arial;background:#f8fafc;margin:0}
.header{background:black;color:white;padding:15px}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
.box{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.table{margin-top:30px}
</style>
</head>
<body>
<div class="header">SalonOS Owner Control</div>
<div class="container">
<div class="grid">
<div class="box">Revenue Today<br><b>₹12,400</b></div>
<div class="box">Appointments<br><b>28</b></div>
<div class="box">Clients Today<br><b>21</b></div>
<div class="box">Upsells<br><b>₹3,200</b></div>
</div>
<div class="table">
<h3>Today's Schedule</h3>
<ul>
<li>10:00 Haircut - Ramesh</li>
<li>11:00 Hair Spa - Akram</li>
<li>12:00 Facial - Neha</li>
</ul>
</div>
</div>
</body>
</html>
