<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SalonOS Owner Dashboard Concept 1</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
.sidebar{width:220px;background:#020617;height:100vh;position:fixed;padding:20px}
.sidebar h2{color:#22c55e}
.sidebar div{margin:15px 0}
.main{margin-left:240px;padding:30px}
.cards{display:flex;gap:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;width:180px}
.table{margin-top:30px;background:#1e293b;padding:20px;border-radius:12px}
</style>
</head>
<body>
<div class="sidebar">
<h2>SalonOS</h2>
<div>Dashboard</div>
<div>Appointments</div>
<div>Staff</div>
<div>Services</div>
<div>Revenue</div>
</div>
<div class="main">
<h1>Owner Dashboard</h1>
<div class="cards">
<div class="card">Today's Revenue<br><b>₹12,400</b></div>
<div class="card">Bookings Today<br><b>28</b></div>
<div class="card">Staff Active<br><b>6</b></div>
<div class="card">AI Upsells<br><b>₹3,200</b></div>
</div>
<div class="table">
<h3>Live Appointments</h3>
<p>10:00 Haircut - Ramesh</p>
<p>11:00 Hair Spa - Akram</p>
<p>12:00 Beard Trim - Walk-in</p>
</div>
</div>
</body>
</html>
