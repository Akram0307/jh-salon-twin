name: CodeQL Security Analysis

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    permissions:
      actions: read
      contents: read
      security-events: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@38b3b7bf288d49ccf58644769dc7a6afdccd05eb
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
          config: |
            paths-ignore:
              - 'node_modules'
              - '**/*.test.ts'
              - '**/*.spec.ts'
              - 'coverage'
              - 'dist'
              - '.next'
      
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c47ff074a7cb1d5f27e5d50e
        with:
          node-version: '20'
      
      - name: Autobuild
        uses: github/codeql-action/autobuild@38b3b7bf288d49ccf58644769dc7a6afdccd05eb
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@38b3b7bf288d49ccf58644769dc7a6afdccd05eb
        with:
          category: "/language:javascript-typescript"
      
      - name: Upload CodeQL results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: codeql-results
          path: codeql-results/
          retention-days: 30
