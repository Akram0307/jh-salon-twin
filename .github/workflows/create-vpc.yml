name: Create Staging VPC Connector
on:
  workflow_dispatch:

jobs:
  create-vpc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: salon-saas-487508

      - name: Create VPC Connector
        run: |
          PROJECT="salon-saas-487508"
          REGION="us-central1"
          CONNECTOR="salonos-staging-vpc"

          echo "========================================"
          echo "CREATE STAGING VPC CONNECTOR"
          echo "========================================"
          echo ""

          # Check if connector already exists and is healthy
          echo "=== Checking if connector exists ==="
          EXISTING_STATE=$(gcloud compute networks vpc-access connectors describe $CONNECTOR --region=$REGION --project=$PROJECT --format="value(state)" 2>/dev/null || echo "NOT_FOUND")

          if [ "$EXISTING_STATE" = "READY" ]; then
            echo "Connector already exists and is READY"
            gcloud compute networks vpc-access connectors describe $CONNECTOR --region=$REGION --project=$PROJECT --format="table(name, state, ipCidrRange)"
            exit 0
          elif [ "$EXISTING_STATE" != "NOT_FOUND" ]; then
            echo "Connector exists but is in state: $EXISTING_STATE - deleting..."
            gcloud compute networks vpc-access connectors delete $CONNECTOR --region=$REGION --project=$PROJECT --quiet
            sleep 30
          fi

          echo ""
          echo "=== Creating new VPC connector ==="
          # Use throughput-based scaling (not instance-based)
          gcloud compute networks vpc-access connectors create $CONNECTOR             --region=$REGION             --network=default             --range=10.9.0.0/28             --machine-type=e2-micro             --min-throughput=200             --max-throughput=1000             --project=$PROJECT

          echo ""
          echo "=== Waiting for connector to be ready ==="
          sleep 30

          echo ""
          echo "=== Verifying connector ==="
          gcloud compute networks vpc-access connectors describe $CONNECTOR             --region=$REGION             --project=$PROJECT             --format="table(name, state, ipCidrRange, network, machineType)"

          echo ""
          echo "========================================"
          echo "VPC CONNECTOR CREATION COMPLETE"
          echo "========================================"
