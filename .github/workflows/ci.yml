name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: salon-saas-487508
  REGION: us-central1

jobs:
  migration-check:
    timeout-minutes: 15
    name: Migration Validation
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Validate dbmate migration pairs
        run: |
          cd db/migrations/dbmate
          errors=0
          for up_file in *.up.sql; do
            base="${up_file%.up.sql}"
            down_file="${base}.down.sql"
            if [ ! -f "$down_file" ]; then
              echo "ERROR: Missing $down_file for $up_file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors migration(s) missing .down.sql files"
            exit 1
          fi
          echo "All $(ls *.up.sql | wc -l) migrations have matching .down.sql files"
      - name: Check migration timestamp ordering
        run: |
          cd db/migrations/dbmate
          prev=""
          for f in *.up.sql; do
            ts="${f%%_*}"
            if [ -n "$prev" ] && [[ "$ts" < "$prev" ]]; then
              echo "ERROR: $f (ts=$ts) is out of order after $prev"
              exit 1
            fi
            prev="$ts"
          done
          echo "Migration timestamps are in order"
      - name: Check migration SQL syntax
        run: |
          cd db/migrations/dbmate
          errors=0
          for f in *.sql; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty"
              errors=$((errors + 1))
            fi
            first_line=$(head -1 "$f")
            if [[ ! "$first_line" =~ ^--\ migrate: ]]; then
              echo "ERROR: $f missing '-- migrate:' header (got: '$first_line')"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "All migration files have valid headers"

  lint:
    timeout-minutes: 15
    name: Lint
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [migration-check]
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c47ff074a7cb1d5f27e5d50e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Run ESLint
        working-directory: ${{ matrix.project }}
        run: npm run lint
        if: matrix.project == 'frontend-next' || matrix.project == 'backend'
  
  type-check:
    timeout-minutes: 15
    name: Type Check
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c47ff074a7cb1d5f27e5d50e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Run TypeScript type check
        working-directory: ${{ matrix.project }}
        run: npx tsc --noEmit
  
  unit-tests:
    timeout-minutes: 15
    name: Unit Tests
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c47ff074a7cb1d5f27e5d50e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Run unit tests
        working-directory: ${{ matrix.project }}
        run: npm run test:run
      
      - name: Upload test coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/
          retention-days: 7
  
  build:
    timeout-minutes: 15
    name: Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c47ff074a7cb1d5f27e5d50e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Build project
        working-directory: ${{ matrix.project }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-${{ matrix.project }}
          path: |
            ${{ matrix.project }}/.next/
            ${{ matrix.project }}/dist/
          retention-days: 7

  # S5-M4: Docker build + Trivy container scanning
  docker-build:
    timeout-minutes: 15
    name: Docker Build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        include:
          - project: frontend-next
            image: salonos-owner-frontend-staging
          - project: backend
            image: salonos-backend-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      
      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.project }}
          load: true
          tags: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          image-ref: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images/${{ matrix.image }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
      
      - name: Run Trivy full scan (all severities) for artifact
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          image-ref: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images/${{ matrix.image }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.project }}.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: true
        continue-on-error: true
      
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: trivy-scan-${{ matrix.project }}
          path: trivy-results-${{ matrix.project }}.sarif
          retention-days: 30

  # S11-10: Secret Manager validation gate for staging deployments
  secrets-validation:
    timeout-minutes: 5
    name: Validate Staging Secrets
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@6fc4af4b2a3368f6db440e0c6758c7d454982e04
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@98ddc00a17442e2a714d56fa6740e2b5c1a63eb3
        with:
          project_id: salon-saas-487508

      - name: Validate staging secrets
        run: |
          chmod +x environments/staging/validate-secrets.sh
          ./environments/staging/validate-secrets.sh
