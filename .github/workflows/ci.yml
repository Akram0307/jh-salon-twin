name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: salon-saas-487508
  REGION: us-central1

jobs:
  migration-check:
    name: Migration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dbmate migration pairs
        run: |
          cd db/migrations/dbmate
          errors=0
          for up_file in *.up.sql; do
            base="${up_file%.up.sql}"
            down_file="${base}.down.sql"
            if [ ! -f "$down_file" ]; then
              echo "ERROR: Missing $down_file for $up_file"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "Found $errors migration(s) missing .down.sql files"
            exit 1
          fi
          echo "All $(ls *.up.sql | wc -l) migrations have matching .down.sql files"
      - name: Check migration timestamp ordering
        run: |
          cd db/migrations/dbmate
          prev=""
          for f in *.up.sql; do
            ts="${f%%_*}"
            if [ -n "$prev" ] && [[ "$ts" < "$prev" ]]; then
              echo "ERROR: $f (ts=$ts) is out of order after $prev"
              exit 1
            fi
            prev="$ts"
          done
          echo "Migration timestamps are in order"
      - name: Check migration SQL syntax
        run: |
          cd db/migrations/dbmate
          errors=0
          for f in *.sql; do
            if [ ! -s "$f" ]; then
              echo "ERROR: $f is empty"
              errors=$((errors + 1))
            fi
            first_line=$(head -1 "$f")
            if [[ ! "$first_line" =~ ^--\ migrate: ]]; then
              echo "ERROR: $f missing '-- migrate:' header (got: '$first_line')"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            exit 1
          fi
          echo "All migration files have valid headers"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [migration-check]
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Run ESLint
        working-directory: ${{ matrix.project }}
        run: npm run lint
        if: matrix.project == 'frontend-next' || matrix.project == 'backend'
  
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Run TypeScript type check
        working-directory: ${{ matrix.project }}
        run: npx tsc --noEmit
  
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Run unit tests
        working-directory: ${{ matrix.project }}
        run: npm run test:run
      
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/
  
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      matrix:
        project: [frontend-next, backend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.project }}/package-lock.json
      
      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: npm ci
      
      - name: Build project
        working-directory: ${{ matrix.project }}
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: |
            ${{ matrix.project }}/.next/
            ${{ matrix.project }}/dist/
          retention-days: 7

  # S5-M4: Docker build + Trivy container scanning
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        include:
          - project: frontend-next
            image: salonos-owner-frontend-staging
          - project: backend
            image: salonos-backend-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.project }}
          load: true
          tags: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images/${{ matrix.image }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          ignore-unfixed: true
      
      - name: Run Trivy full scan (all severities) for artifact
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images/${{ matrix.image }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.project }}.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM,LOW'
          ignore-unfixed: true
        continue-on-error: true
      
      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan-${{ matrix.project }}
          path: trivy-results-${{ matrix.project }}.sarif
          retention-days: 30
