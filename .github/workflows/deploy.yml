name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  PROJECT_ID: salon-saas-487508
  REGION: us-central1
  FRONTEND_SERVICE: salonos-owner-frontend
  BACKEND_SERVICE: salonos-backend
  GAR_LOCATION: us-central1
  GAR_REPOSITORY: salonos-images

jobs:
  deploy-staging:
    name: Deploy to Staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io
      
      - name: Build and push frontend Docker image
        run: |
          cd frontend-next
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
      
      - name: Build and push backend Docker image
        run: |
          cd backend
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
      
      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=10
            --set-env-vars="NEXT_PUBLIC_API_BASE_URL=https://${{ env.BACKEND_SERVICE }}-rgvcleapsa-uc.a.run.app"
      
      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            SALON_ID=${{ secrets.SALON_ID }}
            GCLOUD_PROJECT=${{ env.PROJECT_ID }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}
            TWILIO_API_KEY_SID=${{ secrets.TWILIO_API_KEY_SID }}
            TWILIO_API_KEY_SECRET=${{ secrets.TWILIO_API_KEY_SECRET }}
            TWILIO_WHATSAPP_NUMBER=${{ secrets.TWILIO_WHATSAPP_NUMBER }}
            TEST_TO_NUMBER=${{ secrets.TEST_TO_NUMBER }}
            WAITLIST_TEMPLATE_SID=${{ secrets.WAITLIST_TEMPLATE_SID }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            INSTANCE_CONNECTION_NAME=${{ secrets.INSTANCE_CONNECTION_NAME }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=20
            --add-cloudsql-instances=${{ secrets.INSTANCE_CONNECTION_NAME }}
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests for staging deployment..."
          # Wait for services to be ready
          sleep 30
          # Test frontend
          curl -f https://${{ env.FRONTEND_SERVICE }}-rgvcleapsa-uc.a.run.app/ || exit 1
          # Test backend health endpoint
          curl -f https://${{ env.BACKEND_SERVICE }}-rgvcleapsa-uc.a.run.app/health || exit 1
          echo "Smoke tests passed!"
  
  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-staging]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
      
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io
      
      - name: Build and push frontend Docker image
        run: |
          cd frontend-next
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
      
      - name: Build and push backend Docker image
        run: |
          cd backend
          docker build -t gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }} .
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
      
      - name: Deploy frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}-prod
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.FRONTEND_SERVICE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=10
            --set-env-vars="NEXT_PUBLIC_API_BASE_URL=https://${{ env.BACKEND_SERVICE }}-prod-rgvcleapsa-uc.a.run.app"
      
      - name: Deploy backend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}-prod
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.BACKEND_SERVICE }}:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            DB_USER=${{ secrets.DB_USER_PROD }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD_PROD }}
            DB_HOST=${{ secrets.DB_HOST_PROD }}
            DB_PORT=${{ secrets.DB_PORT_PROD }}
            DB_NAME=${{ secrets.DB_NAME_PROD }}
            SALON_ID=${{ secrets.SALON_ID_PROD }}
            GCLOUD_PROJECT=${{ env.PROJECT_ID }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY_PROD }}
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID_PROD }}
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN_PROD }}
            TWILIO_API_KEY_SID=${{ secrets.TWILIO_API_KEY_SID_PROD }}
            TWILIO_API_KEY_SECRET=${{ secrets.TWILIO_API_KEY_SECRET_PROD }}
            TWILIO_WHATSAPP_NUMBER=${{ secrets.TWILIO_WHATSAPP_NUMBER_PROD }}
            TEST_TO_NUMBER=${{ secrets.TEST_TO_NUMBER_PROD }}
            WAITLIST_TEMPLATE_SID=${{ secrets.WAITLIST_TEMPLATE_SID_PROD }}
            REDIS_HOST=${{ secrets.REDIS_HOST_PROD }}
            REDIS_PORT=${{ secrets.REDIS_PORT_PROD }}
            INSTANCE_CONNECTION_NAME=${{ secrets.INSTANCE_CONNECTION_NAME_PROD }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=20
            --add-cloudsql-instances=${{ secrets.INSTANCE_CONNECTION_NAME_PROD }}
      
      - name: Run smoke tests
        run: |
          echo "Running smoke tests for production deployment..."
          # Wait for services to be ready
          sleep 30
          # Test frontend
          curl -f https://${{ env.FRONTEND_SERVICE }}-prod-rgvcleapsa-uc.a.run.app/ || exit 1
          # Test backend health endpoint
          curl -f https://${{ env.BACKEND_SERVICE }}-prod-rgvcleapsa-uc.a.run.app/health || exit 1
          echo "Production smoke tests passed!"
