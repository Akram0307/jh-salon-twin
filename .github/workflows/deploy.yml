name: CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  PROJECT_ID: salon-saas-487508
  REGION: us-central1
  GAR_REGISTRY: us-central1-docker.pkg.dev/salon-saas-487508/salonos-images
  FRONTEND_SERVICE: salonos-owner-frontend
  BACKEND_SERVICE: salonos-backend
  STAGING_FRONTEND_SERVICE: salonos-owner-frontend-staging
  STAGING_BACKEND_SERVICE: salonos-backend-staging
  STAGING_SA: salonos-staging-sa@salon-saas-487508.iam.gserviceaccount.com
  VPC_CONNECTOR: salonos-staging-vpc
  PROD_SA: salonos-prod-sa@salon-saas-487508.iam.gserviceaccount.com
  PROD_VPC_CONNECTOR: salonos-prod-vpc

concurrency:
  group: ${{ github.event.inputs.environment || 'staging' }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker-build:
    timeout-minutes: 20
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for GAR
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push frontend-next image
        run: |
          cd frontend-next
          docker build -t ${{ env.GAR_REGISTRY }}/frontend:${{ github.sha }} .
          docker push ${{ env.GAR_REGISTRY }}/frontend:${{ github.sha }}

      - name: Build and push backend image
        run: |
          cd backend
          docker build -t ${{ env.GAR_REGISTRY }}/backend:${{ github.sha }} .
          docker push ${{ env.GAR_REGISTRY }}/backend:${{ github.sha }}

  deploy-staging:
    timeout-minutes: 25
    name: Deploy to Staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    runs-on: ubuntu-latest
    environment: staging
    needs: [docker-build]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy frontend to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.STAGING_FRONTEND_SERVICE }}
          image: ${{ env.GAR_REGISTRY }}/frontend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --vpc-connector=${{ env.VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only
            --no-allow-unauthenticated
            --port=8080
            --memory=1Gi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=10
            --service-account=${{ env.STAGING_SA }}
            --set-env-vars="NEXT_PUBLIC_API_BASE_URL=https://${{ env.STAGING_BACKEND_SERVICE }}-rgvcleapsa-uc.a.run.app,NODE_ENV=staging"
            --set-secrets="STAGING_BASIC_AUTH_PASSWORD=salonos-staging-STAGING_BASIC_AUTH_PASSWORD:latest"

      - name: Deploy backend to Cloud Run (staging)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.STAGING_BACKEND_SERVICE }}
          image: ${{ env.GAR_REGISTRY }}/backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --vpc-connector=${{ env.VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only
            --no-allow-unauthenticated
            --port=8080
            --memory=1Gi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=20
            --service-account=${{ env.STAGING_SA }}
            --add-cloudsql-instances=${{ secrets.STAGING_INSTANCE_CONNECTION_NAME }}
            --set-env-vars="NODE_ENV=staging,GCLOUD_PROJECT=${{ env.PROJECT_ID }},LOG_LEVEL=info,OTEL_ENABLED=true,ALLOWED_ORIGINS=https://${{ env.STAGING_FRONTEND_SERVICE }}-rgvcleapsa-uc.a.run.app"
            --set-secrets=|
              JWT_SECRET=salonos-staging-JWT_SECRET_STAGING:latest
              REFRESH_TOKEN_SECRET=salonos-staging-REFRESH_TOKEN_SECRET_STAGING:latest
              DB_USER=salonos-staging-DB_USER:latest
              DB_PASSWORD=salonos-staging-DB_PASSWORD:latest
              DB_HOST=salonos-staging-DB_HOST:latest
              DB_PORT=salonos-staging-DB_PORT:latest
              DB_NAME=salonos-staging-DB_NAME:latest
              REDIS_HOST=salonos-staging-REDIS_HOST:latest
              REDIS_PORT=salonos-staging-REDIS_PORT:latest
              INSTANCE_CONNECTION_NAME=salonos-staging-INSTANCE_CONNECTION_NAME:latest
              TWILIO_ACCOUNT_SID=salonos-staging-TWILIO_ACCOUNT_SID:latest
              TWILIO_AUTH_TOKEN=salonos-staging-TWILIO_AUTH_TOKEN:latest
              OPENROUTER_API_KEY=salonos-staging-OPENROUTER_API_KEY:latest
              SMTP_HOST=salonos-staging-SMTP_HOST:latest
              SMTP_USER=salonos-staging-SMTP_USER:latest
              SMTP_PASS=salonos-staging-SMTP_PASS:latest

      - name: Start Cloud SQL Auth Proxy (staging)
        run: |
          wget -qO- https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64 > /usr/local/bin/cloud-sql-proxy
          chmod +x /usr/local/bin/cloud-sql-proxy
          cloud-sql-proxy ${{ secrets.STAGING_INSTANCE_CONNECTION_NAME }} --port 5432 &
          echo "Waiting for Cloud SQL proxy to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 5432 2>/dev/null; then
              echo "Cloud SQL proxy ready on port 5432"
              break
            fi
            sleep 1
          done
          if ! nc -z localhost 5432 2>/dev/null; then
            echo "ERROR: Cloud SQL proxy failed to start"
            exit 1
          fi

      - name: Run database migrations (staging)
        run: |
          cd backend
          DB_USER=$(gcloud secrets versions access latest --secret="salonos-staging-DB_USER")
          DB_PASSWORD=$(gcloud secrets versions access latest --secret="salonos-staging-DB_PASSWORD")
          DB_NAME=$(gcloud secrets versions access latest --secret="salonos-staging-DB_NAME")
          export DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}?sslmode=disable"
          wget -qO- https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64 > /usr/local/bin/dbmate
          chmod +x /usr/local/bin/dbmate
          dbmate status
          dbmate up

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: pkill -f cloud-sql-proxy || true

      - name: Smoke test (staging)
        run: |
          sleep 30
          STAGING_URL="https://${{ env.STAGING_BACKEND_SERVICE }}-rgvcleapsa-uc.a.run.app"
          TOKEN=$(gcloud auth print-identity-token --audiences="$STAGING_URL" 2>/dev/null || echo "")
          if [ -n "$TOKEN" ]; then
            echo "Testing authenticated /health endpoint..."
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $TOKEN" "$STAGING_URL/health")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Authenticated health check passed (HTTP $HTTP_CODE)"
            else
              echo "Authenticated health check failed (HTTP $HTTP_CODE), trying fallback..."
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health/ready")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "Fallback unauthenticated health check passed (HTTP $HTTP_CODE)"
              else
                echo "ERROR: All smoke tests failed (last HTTP $HTTP_CODE)"
                exit 1
              fi
            fi
          else
            echo "WARN: Could not obtain ID token, using unauthenticated fallback"
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health/ready")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Unauthenticated health check passed (HTTP $HTTP_CODE)"
            else
              echo "ERROR: Unauthenticated health check failed (HTTP $HTTP_CODE)"
              exit 1
            fi
          fi
          echo "Staging smoke tests passed"

  deploy-production:
    timeout-minutes: 25
    name: Deploy to Production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production
    needs: [deploy-staging]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy frontend to Cloud Run (production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.FRONTEND_SERVICE }}
          image: ${{ env.GAR_REGISTRY }}/frontend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --allow-unauthenticated
            --port=8080
            --memory=1Gi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=10
            --service-account=${{ env.PROD_SA }}
            --set-env-vars="NEXT_PUBLIC_API_BASE_URL=https://${{ env.BACKEND_SERVICE }}-rgvcleapsa-uc.a.run.app,NODE_ENV=production"

      - name: Deploy backend to Cloud Run (production)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.BACKEND_SERVICE }}
          image: ${{ env.GAR_REGISTRY }}/backend:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: |
            --no-allow-unauthenticated
            --port=8080
            --memory=1Gi
            --cpu=1
            --concurrency=80
            --timeout=300
            --max-instances=20
            --vpc-connector=${{ env.PROD_VPC_CONNECTOR }}
            --vpc-egress=private-ranges-only
            --service-account=${{ env.PROD_SA }}
            --add-cloudsql-instances=${{ secrets.PROD_INSTANCE_CONNECTION_NAME }}
            --set-env-vars="NODE_ENV=production,GCLOUD_PROJECT=${{ env.PROJECT_ID }},LOG_LEVEL=warn,OTEL_ENABLED=true,ALLOWED_ORIGINS=https://${{ env.FRONTEND_SERVICE }}-rgvcleapsa-uc.a.run.app"
            --set-secrets=|
              JWT_SECRET=salonos-prod-JWT_SECRET:latest
              REFRESH_TOKEN_SECRET=salonos-prod-REFRESH_TOKEN_SECRET:latest
              DB_USER=salonos-prod-DB_USER:latest
              DB_PASSWORD=salonos-prod-DB_PASSWORD:latest
              DB_HOST=salonos-prod-DB_HOST:latest
              DB_PORT=salonos-prod-DB_PORT:latest
              DB_NAME=salonos-prod-DB_NAME:latest
              SALON_ID=salonos-prod-SALON_ID:latest
              REDIS_HOST=salonos-prod-REDIS_HOST:latest
              REDIS_PORT=salonos-prod-REDIS_PORT:latest
              INSTANCE_CONNECTION_NAME=salonos-prod-INSTANCE_CONNECTION_NAME:latest
              OPENROUTER_API_KEY=salonos-prod-OPENROUTER_API_KEY:latest
              TWILIO_ACCOUNT_SID=salonos-prod-TWILIO_ACCOUNT_SID:latest
              TWILIO_AUTH_TOKEN=salonos-prod-TWILIO_AUTH_TOKEN:latest
              TWILIO_API_KEY_SID=salonos-prod-TWILIO_API_KEY_SID:latest
              TWILIO_API_KEY_SECRET=salonos-prod-TWILIO_API_KEY_SECRET:latest
              TWILIO_WHATSAPP_NUMBER=salonos-prod-TWILIO_WHATSAPP_NUMBER:latest
              WAITLIST_TEMPLATE_SID=salonos-prod-WAITLIST_TEMPLATE_SID:latest

      - name: Start Cloud SQL Auth Proxy (production)
        run: |
          wget -qO- https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.0/cloud-sql-proxy.linux.amd64 > /usr/local/bin/cloud-sql-proxy
          chmod +x /usr/local/bin/cloud-sql-proxy
          cloud-sql-proxy ${{ secrets.PROD_INSTANCE_CONNECTION_NAME }} --port 5432 &
          echo "Waiting for Cloud SQL proxy to be ready..."
          for i in $(seq 1 30); do
            if nc -z localhost 5432 2>/dev/null; then
              echo "Cloud SQL proxy ready on port 5432"
              break
            fi
            sleep 1
          done
          if ! nc -z localhost 5432 2>/dev/null; then
            echo "ERROR: Cloud SQL proxy failed to start"
            exit 1
          fi

      - name: Run database migrations (production)
        run: |
          cd backend
          DB_USER=$(gcloud secrets versions access latest --secret="salonos-prod-DB_USER")
          DB_PASSWORD=$(gcloud secrets versions access latest --secret="salonos-prod-DB_PASSWORD")
          DB_NAME=$(gcloud secrets versions access latest --secret="salonos-prod-DB_NAME")
          export DATABASE_URL="postgres://${DB_USER}:${DB_PASSWORD}@localhost:5432/${DB_NAME}?sslmode=disable"
          wget -qO- https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64 > /usr/local/bin/dbmate
          chmod +x /usr/local/bin/dbmate
          dbmate status
          dbmate up

      - name: Stop Cloud SQL Auth Proxy
        if: always()
        run: pkill -f cloud-sql-proxy || true

      - name: Smoke test (production)
        run: |
          sleep 30
          curl -f https://${{ env.FRONTEND_SERVICE }}-rgvcleapsa-uc.a.run.app/ || exit 1
          echo "Production smoke tests passed"
