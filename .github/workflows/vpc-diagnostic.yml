name: VPC Diagnostic
on:
  workflow_dispatch:

jobs:
  check-vpc:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: salon-saas-487508

      - name: Check VPC Connector Status
        run: |
          echo "=== Checking VPC Connector Status ==="
          gcloud compute networks vpc-access connectors describe salonos-staging-vpc             --region=us-central1             --project=salon-saas-487508             --format=json 2>&1 || echo "CONNECTOR_NOT_FOUND"

          echo ""
          echo "=== Listing all connectors in us-central1 ==="
          gcloud compute networks vpc-access connectors list             --region=us-central1             --project=salon-saas-487508 2>&1

          echo ""
          echo "=== Checking connector IAM permissions ==="
          gcloud projects get-iam-policy salon-saas-487508             --flatten="bindings[].members"             --format="table(bindings.role)"             --filter="bindings.members:salonos-staging-sa@salon-saas-487508.iam.gserviceaccount.com" 2>&1
