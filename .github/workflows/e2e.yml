name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      run_smoke_only:
        description: 'Run smoke tests only'
        required: false
        default: 'false'
        type: boolean

env:
  BASE_URL: http://localhost:3000
  API_URL: http://localhost:4000

cancel-in-progress: true

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: salonos_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: salonos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: true
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd frontend-next && npm ci
          cd ../backend && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup test database
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: salonos_test
          DB_PASSWORD: test_password
          DB_NAME: salonos_test
        run: |
          npm run db:migrate || echo "No migrate script, using schema directly"
          psql -h localhost -U salonos_test -d salonos_test -f ../db/schema.sql || true

      - name: Build frontend
        working-directory: frontend-next
        run: npm run build

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: salonos_test
          DB_PASSWORD: test_password
          DB_NAME: salonos_test
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test
        run: |
          npm start &
          sleep 5
          # Wait for backend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:4000/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Start frontend
        working-directory: frontend-next
        run: |
          npm start &
          sleep 5
          # Wait for frontend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is ready"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Run smoke tests
        if: github.event_name == 'push' || inputs.run_smoke_only == 'true'
        run: npx playwright test --grep @smoke --reporter=html,json
        continue-on-error: false

      - name: Run full E2E tests
        if: github.event_name == 'pull_request' || inputs.run_smoke_only == 'false'
        run: npx playwright test --reporter=html,json,junit
        continue-on-error: false

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: test-results/results.json
          retention-days: 14

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report-${{ github.sha }}
          path: test-results/junit.xml
          retention-days: 14

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ github.sha }}
          path: test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results;
            try {
              results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
            } catch (e) {
              console.log('No results file found');
              return;
            }

            const passed = results.stats?.passed || 0;
            const failed = results.stats?.failed || 0;
            const skipped = results.stats?.skipped || 0;
            const duration = results.stats?.duration || 0;

            const comment = `## 🧪 E2E Test Results

            | Metric | Value |
            |--------|-------|
            | ✅ Passed | ${passed} |
            | ❌ Failed | ${failed} |
            | ⏭️ Skipped | ${skipped} |
            | ⏱️ Duration | ${(duration / 1000).toFixed(1)}s |

            ${failed > 0 ? '⚠️ **Some tests failed. Please review the attached report.**' : '✅ **All tests passed!**'}

            [View Full Report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  smoke-test-deployment:
    name: Smoke Test on Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [e2e-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run deployment smoke tests
        env:
          BASE_URL: ${{ secrets.STAGING_URL || 'https://salonos-owner-frontend-rgvcleapsa-uc.a.run.app' }}
        run: |
          npx playwright test e2e/smoke --reporter=html

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-report
          path: playwright-report/
          retention-days: 7
