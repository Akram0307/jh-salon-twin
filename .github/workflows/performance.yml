name: Performance Budgets

on:
  workflow_dispatch:

jobs:
  performance-check:
    name: Check Performance Budgets
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c47ff074a7cb1d5f27e5d50e
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        working-directory: frontend-next
        run: npm ci

      - name: Build frontend
        working-directory: frontend-next
        run: npm run build

      - name: Check bundle size with size-limit
        working-directory: frontend-next
        run: |
          npm run size
          # Check if any bundle exceeds the limit
          npx size-limit --json | jq -e '.[] | select(.size > 204800)' && exit 1 || echo "Bundle size within limits"

      - name: Run Lighthouse CI
        working-directory: frontend-next
        run: |
          npm install -g @lhci/cli
          lhci collect --url="http://localhost:3000/owner/dashboard" --url="http://localhost:3000/owner/schedule" --start-server-command="npm start" --numberOfRuns=3
          lhci assert
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7

      - name: Comment PR with performance results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read size-limit results
            let sizeResults;
            try {
              sizeResults = JSON.parse(fs.readFileSync('frontend-next/.size-limit.json', 'utf8'));
            } catch (e) {
              console.log('No size-limit results found');
              sizeResults = [];
            }

            // Read Lighthouse results
            let lighthouseResults = [];
            try {
              const files = fs.readdirSync('.lighthouseci');
              for (const file of files) {
                if (file.endsWith('.json')) {
                  const content = JSON.parse(fs.readFileSync(path.join('.lighthouseci', file), 'utf8'));
                  lighthouseResults.push(content);
                }
              }
            } catch (e) {
              console.log('No Lighthouse results found');
            }

            // Build comment
            let comment = '## 📊 Performance Budget Report

            ';

            // Bundle size section
            comment += '### Bundle Size
            ';
            if (sizeResults.length > 0) {
              comment += '| Bundle | Size | Budget | Status |
            ';
              comment += '|--------|------|--------|--------|
            ';
              for (const result of sizeResults) {
                const sizeKB = (result.size / 1024).toFixed(2);
                const budgetKB = 200; // 200 kB budget
                const status = result.size <= budgetKB * 1024 ? '✅' : '❌';
                comment += `| ${result.name} | ${sizeKB} kB | ${budgetKB} kB | ${status} |
            `;
              }
            } else {
              comment += 'No bundle size data available.
            ';
            }

            comment += '
            ';

            // Lighthouse section
            comment += '### Lighthouse Scores
            ';
            if (lighthouseResults.length > 0) {
              const avgScores = {
                performance: 0,
                accessibility: 0,
                bestPractices: 0,
                seo: 0
              };

              for (const result of lighthouseResults) {
                if (result.categories) {
                  avgScores.performance += result.categories.performance?.score || 0;
                  avgScores.accessibility += result.categories.accessibility?.score || 0;
                  avgScores.bestPractices += result.categories['best-practices']?.score || 0;
                  avgScores.seo += result.categories.seo?.score || 0;
                }
              }

              const count = lighthouseResults.length;
              comment += '| Metric | Score | Budget | Status |
            ';
              comment += '|--------|-------|--------|--------|
            ';
              comment += `| Performance | ${((avgScores.performance / count) * 100).toFixed(0)} | 90 | ${(avgScores.performance / count) >= 0.9 ? '✅' : '❌'} |
            `;
              comment += `| Accessibility | ${((avgScores.accessibility / count) * 100).toFixed(0)} | 95 | ${(avgScores.accessibility / count) >= 0.95 ? '✅' : '❌'} |
            `;
              comment += `| Best Practices | ${((avgScores.bestPractices / count) * 100).toFixed(0)} | 90 | ${(avgScores.bestPractices / count) >= 0.9 ? '✅' : '❌'} |
            `;
              comment += `| SEO | ${((avgScores.seo / count) * 100).toFixed(0)} | 90 | ${(avgScores.seo / count) >= 0.9 ? '✅' : '❌'} |
            `;
            } else {
              comment += 'No Lighthouse data available.
            ';
            }

            comment += '
            ---
            ';
            comment += '*Performance budgets are enforced to ensure optimal user experience.*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
